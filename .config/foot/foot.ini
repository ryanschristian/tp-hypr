[main]
include=~/.config/foot/themes/noctalia

title=Foot
app-id=Foot
locked-title=yes

font=JetBrainsMonoNerdFont-Regular:size=12
font-bold=JetBrainsMonoNerdFont-Bold:size=12
font-italic=JetBrainsMonoNerdFont-Italic:size=12
font-bold-italic=JetBrainsMonoNerdFont-BoldItalic:size=12

pad=12x12 center-when-maximized-and-fullscreen

[colors-dark]
#background=1a1b26
#foreground=c0caf5
alpha=0.9

## Normal/regular colors (color palette 0-7)
#regular0=15161E  # black
#regular1=f7768e  # red
#regular2=9ece6a  # green
#regular3=e0af68  # yellow
#regular4=7aa2f7  # blue
#regular5=bb9af7  # magenta
#regular6=7dcfff  # cyan
#regular7=a9b1d6  # white

## Bright colors (color palette 8-15)
#bright0=414868   # bright black
#bright1=f7768e   # bright red
#bright2=9ece6a   # bright green
#bright3=e0af68   # bright yellow
#bright4=7aa2f7   # bright blue
#bright5=bb9af7   # bright magenta
#bright6=7dcfff   # bright cyan
#bright7=c0caf5   # bright white

## dimmed colors (see foot.ini(5) man page)
#dim0=ff9e64
#dim1=db4b4b

[bell]
system=no
urgent=no
notify=no
visual=no

[cursor]
style=block
blink=no
blink-rate=500
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[key-bindings]
fullscreen = Control+Return
