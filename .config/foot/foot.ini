[main]
include=~/.config/foot/themes/noctalia

title=Foot
app-id=Foot
locked-title=yes

font=JetBrainsMonoNerdFont-Regular:size=12
font-bold=JetBrainsMonoNerdFont-Bold:size=12
font-italic=JetBrainsMonoNerdFont-Italic:size=12
font-bold-italic=JetBrainsMonoNerdFont-BoldItalic:size=12

pad=12x12 center-when-maximized-and-fullscreen

[colors-dark]
alpha=0.9
blur=yes

[bell]
system=no
urgent=no
notify=no
visual=no

[cursor]
style=block
blink=no
blink-rate=500
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[key-bindings]
fullscreen = Control+Return
